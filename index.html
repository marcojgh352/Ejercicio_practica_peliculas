<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Manager App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Movie App</h1>
    </header>

    <!-- Formulario para agregar nueva película -->
    <section id="form-section">
      <h2>Agregar Nueva Película</h2>
      <form id="movieForm">
        <label for="title">Título:</label>
        <input type="text" id="title" name="title" required />

        <label for="year">Año:</label>
        <input type="number" id="year" name="year" required />

        <label for="description">Descripción:</label>
        <textarea
          id="description"
          name="description"
          rows="3"
          required
        ></textarea>

        <label for="photo">URL de la foto:</label>
        <input type="url" id="photo" name="photo" />

        <label for="genre">Género:</label>
        <select id="genre" name="genre" required>
          <option value="">Selecciona un género</option>
          <option value="terror">Terror</option>
          <option value="acción">Acción</option>
          <option value="comedia">Comedia</option>
          <option value="romántica">Romántica</option>
        </select>

        <button type="submit" id="submit">Añadir Película</button>
      </form>
    </section>

    <!-- Filtros -->
    <section id="filters">
      <h2>Filtros</h2>
      <label for="filter-genre">Filtrar por género:</label>
      <select id="filter-genre">
        <option value="">Todos</option>
        <option value="terror">Terror</option>
        <option value="acción">Acción</option>
        <option value="comedia">Comedia</option>
        <option value="romántica">Romántica</option>
      </select>

      <label for="filter-name">Filtrar por nombre:</label>
      <input type="text" id="filter-name" placeholder="Escribe el título" />
    </section>

    <!-- Tabla de películas -->
    <section id="table-section">
      <h2>Películas</h2>
      <table id="moviesTable">
        <thead>
          <tr>
            <th data-label="Título">Título</th>
            <th data-label="Año">Año</th>
            <th data-label="Descripción">Descripción</th>
            <th data-label="Foto">Foto</th>
            <th data-label="Género">Género</th>
            <th data-label="Acciones">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <!-- PELÍCULAS DINÁMICAS  -->
        </tbody>
      </table>
    </section>

    <!-- edición -->
    <section id="editModal" class="modal" style="display: none">
      <section class="modal-content">
        <h3>Editar Película</h3>
        <form id="editForm">
          <label for="editTitle">Título:</label>
          <input type="text" id="editTitle" name="title" required />

          <label for="editYear">Año:</label>
          <input type="number" id="editYear" name="year" required />

          <label for="editDescription">Descripción:</label>
          <textarea
            id="editDescription"
            name="description"
            rows="3"
            required
          ></textarea>

          <label for="editPhoto">URL de la foto:</label>
          <input type="url" id="editPhoto" name="photo" />

          <label for="editGenre">Género:</label>
          <select id="editGenre" name="genre" required>
            <option value="">Selecciona un género</option>
            <option value="terror">Terror</option>
            <option value="acción">Acción</option>
            <option value="comedia">Comedia</option>
            <option value="romántica">Romántica</option>
          </select>

          <section class="button-group">
            <button type="submit">Actualizar</button>
            <button type="button" id="cancelEdit">Cancelar</button>
          </section>
        </form>
      </section>
    </section>

    <script src="script.js"></script>
  </body>
</html>
